name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - uses: KooshaPari/phenotypeActions/actions/policy-gate@0000000000000000000000000000000000000000 # placeholder SHA; source 404s; replace when reachable
        with:
          base_branch: main
          block_merge_commits: true
          require_layered_fix: true
